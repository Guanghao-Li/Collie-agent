# 进阶拆分配置示例。
# 默认优先使用根目录的 config.example.toml；这里保留给需要 extends 的场景。
# 本地开发完整配置示例。

[config]
extends = [
  "base.toml",
  "discord.example.toml",
  "llm.echo.toml",
]

# 常改项可以直接覆盖在这里。
[discord]
enabled = true
bot_token = "${DISCORD_BOT_TOKEN}"
guild_id = "${DISCORD_GUILD_ID}"
allowed_channel_ids = []
allowed_user_ids = []
default_push_channel_id = "${DISCORD_DEFAULT_PUSH_CHANNEL_ID}"

[llm]
provider = "echo"

[llm.compatible]
model = "${LLM_MODEL}"
api_key = "${LLM_API_KEY}"
base_url = "${LLM_BASE_URL}"
timeout_seconds = 30
temperature = 0.7

[llm.fast]
enabled = false
model = ""
api_key = ""
base_url = ""
timeout_seconds = 15
temperature = 0.0
fallback_to_main = true
