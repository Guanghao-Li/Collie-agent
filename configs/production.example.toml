# 进阶拆分配置示例。
# 默认优先使用根目录的 config.example.toml；这里保留给需要 extends 的场景。
# 长期运行配置示例。
# 这个模板默认启用 Discord、OpenAI 兼容 provider、记忆、主动推送和 Drift。

[config]
extends = [
  "base.toml",
  "discord.example.toml",
  "llm.compatible.example.toml",
]

[discord]
enabled = true
bot_token = "${DISCORD_BOT_TOKEN}"
guild_id = "${DISCORD_GUILD_ID}"
allowed_channel_ids = []
allowed_user_ids = []
default_push_channel_id = "${DISCORD_DEFAULT_PUSH_CHANNEL_ID}"

[llm]
provider = "openai-compatible"

[llm.compatible]
model = "${LLM_MODEL}"
api_key = "${LLM_API_KEY}"
base_url = "${LLM_BASE_URL}"
timeout_seconds = 30
temperature = 0.7

[llm.fast]
enabled = false
model = ""
api_key = ""
base_url = ""
timeout_seconds = 15
temperature = 0.0
fallback_to_main = true

[proactive]
enabled = true
interval_seconds = 900
quiet_hours_start = "23:00"
quiet_hours_end = "08:00"
min_score_to_push = 0.72
max_pushes_per_day = 6
fast_prefilter_enabled = true
fast_prefilter_min_score = 0.4

[drift]
enabled = true
interval_seconds = 1800
run_only_when_idle = true
idle_after_seconds = 600
max_tasks_per_cycle = 2
